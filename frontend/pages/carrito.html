<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Press+Start+2P&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link href="../css/global.css" rel="stylesheet" />
    <link href="../css/navbar.css" rel="stylesheet" />
    <link href="../css/productos.css" rel="stylesheet" />
    <link href="../css/cards.css" rel="stylesheet" />
    <link href="../css/carrito.css" rel="stylesheet" />
    <title>"No hay Polque" Store - Carrito</title>

    <script>
        (function () {
            const nombreUsuario = localStorage.getItem("nombreUsuario");
            if (!nombreUsuario) {
                window.location.href = "../index.html";
            }
        })();
    </script>
</head>

<body>
    <div class="content">
        <header>
            <div class="logo">
                <img src="../assets/img/logo_tienda.png" alt="logo no hay polque">
            </div>
            <ul class="enlaces">
                <li class="enlace"><a href="./productos.html"><span>PRODUCTOS</span></a></li>
                <li class="enlace"><a href="./ofertas.html"><span>OFERTAS</span></a></li>
                <li class="enlace"><a href="./carrito.html"><span>CARRITO</span></a></li>
                <li class="enlace"><button id="boton-salir">SALIR</button></li>
            </ul>
        </header>

        <main>
            <section class="seccion-carrito">
                <div>
                    <h1 id="bienvenida"></h1>
                    <div class="seccion-carrito-banner" style="background-image: url('../assets/img/banner2.png')">
                        <h2>Tu carrito de compras</h2>
                    </div>
                </div>
                
                <div id="contenedor-carrito"></div>
                
                <div class="carrito-resumen">
                    <div class="carrito-total">
                        <h3>TOTAL:</h3>
                        <p id="total-precio">$0</p>
                    </div>
                    <button id="btn-finalizar-compra" class="btn-finalizar">Finalizar compra</button>
                </div>
            </section>
        </main>

        <div class="theme-button" id="themeToggle">
            <div class="theme-container">
                <div class="theme-circle" id="themeCircle">
                    <div>
                        <span class="icon-sun">☀️</span>
                        <span class="icon-moon">🌙</span>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <h3>By Axel Castellano - Saulo Fernández ™</h3>
        </footer>
    </div>

    <!-- Modales -->
    <div id="modalConfirmacion" class="modal-overlay">
        <div class="modal-card">
            <h2>Confirmar Compra</h2>
            <p>¿Estás seguro de que deseas finalizar tu compra?</p>
            <div class="modal-buttons">
                <button id="btnConfirmarSi" class="btn btn-confirm">Sí, confirmar</button>
                <button id="btnConfirmarNo" class="btn btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modalAlerta" class="modal-overlay">
        <div class="modal-card">
            <h2 id="alertaTitulo">Atención</h2>
            <p id="alertaMensaje">Mensaje de la alerta.</p>
            <div class="modal-buttons">
                <button id="btnAlertaAceptar" class="btn btn-confirm">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="../js/carrito/carrito_data.js"></script>
    <script src="../js/carrito/carrito_modal.js"></script>
    <script src="../js/carrito/carrito_actions.js"></script>
    <script src="../js/carrito/carrito_render.js"></script>
    <script src="../js/carrito/carrito_main.js"></script>
    <script src="../js/ui/theme.js"></script>
    <script src="../js/ticket.js"></script>
</body>

</html>
