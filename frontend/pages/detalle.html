<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Press+Start+2P&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet" />
    <link href="/css/navbar.css" rel="stylesheet" />
    <link href="/css/productos.css" rel="stylesheet" />
    <link href="/css/cards.css" rel="stylesheet" />
    <title>Detalle de Producto - "No hay Polque" Store</title>

    <script src="../js/verificar_sesion.js"></script>
</head>

<body>
    <div class="content">
        <!-- El header se cargará dinámicamente -->
        <header></header>

        <main>
            <section class="seccion-detalle">
                <div class="volver-atras">
                    <a href="/pages/productos.html" class="btn-volver">← Volver al Catálogo</a>
                </div>
                
                <div class="detalle-container" id="detalle-container">
                    <div class="detalle-loading">
                        <p>Cargando detalles del producto...</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Botón flotante del carrito -->
        <a href="/pages/carrito.html" class="carrito" id="carritoToggle">
            <img src="/assets/img/carrito.png" alt="carrito" />
            <span class="carrito-contador" id="carritoContador" style="display: none;">0</span>
        </a>

        <!-- Botón del Tema (Claro/Oscuro) -->
        <div class="theme-button" id="themeToggle">
            <div class="theme-container">
                <div class="theme-circle" id="themeCircle">
                    <div>
                        <span class="icon-sun">☀️</span>
                        <span class="icon-moon">🌙</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- El footer se cargará dinámicamente -->
        <footer></footer>
    </div>

    <!-- Scripts comunes del Kiosco -->
    <script src="/js/ui/load_components.js"></script>
    <script src="/js/ui/theme.js"></script>
    <script src="/js/carrito/carrito_data.js"></script>
    <script src="/js/carrito/carrito_actions.js"></script>
    <script src="/js/ui/contador_carrito.js"></script>
    <script src="/js/producto_oferta/detalle.js"></script>
</body>

</html>
