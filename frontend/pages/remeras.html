<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Press+Start+2P&family=ZCOOL+KuaiLe&display=swap"
        rel="stylesheet">
    <link href="../css/global.css" rel="stylesheet" />
    <link href="../css/navbar.css" rel="stylesheet" />
    <link href="../css/productos.css" rel="stylesheet" />
    <link href="../css/cards.css" rel="stylesheet" />
    <title>"No hay Polque" Store - Productos</title>

    <script src="../js/verificar_sesion.js"></script>
</head>

<body>
    <div class="content">

        <header></header>

        <main>
            <section class="seccion-productos">
                <div>
                    <h1 id="bienvenida"></h1>
                    <div class="seccion-productos-banner">
                        <h2>¿Que vas a llevar?</h2>
                    </div>
                </div>
                <div id="contenedor-productos"></div>
            </section>
        </main>


        <section class="paginacion-section">
            <div id="paginador-contenedor" class="paginador-flex"></div>
        </section>

        <section class="mira-ofertas-section">
            <a href="./pantalones.html" class="mira-ofertas">
                <div>
                    <h3>Mira nuestros pantalones</h3>
                </div>
                <div class="mira-ofertas-flecha">
                    <div>➜</div>
                </div>
            </a>
        </section>

        <div class="theme-button" id="themeToggle">
            <div class="theme-container">
                <div class="theme-circle" id="themeCircle">
                    <div>
                        <span class="icon-sun">☀️</span>
                        <span class="icon-moon">🌙</span>
                    </div>
                </div>
            </div>
        </div>

        <a href="./carrito.html" class="carrito" id="carritoToggle">
            <img src="../assets/img/carrito.png" />
            <span class="carrito-contador" id="carritoContador" style="display: none;">0</span>
        </a>

        <footer></footer>
    </div>

    <script src="../js/ui/load_components.js"></script>
    <script src="../js/productos_provisorios.js"></script>
    <script src="../js/ui/theme.js"></script>
    <script src="../js/sesion.js"></script>
    <script src="../js/producto_oferta/agregar_carrito.js"></script>
    <script src="../js/producto_oferta/renderizar_paginacion.js"></script>
    <script src="../js/producto_oferta/renderizar_producto.js"></script>
    <script src="../js/ui/contador_carrito.js"></script>
    <script src="../js/producto_oferta/main.js"></script>
</body>

</html>
